name: Deploy to ECS (Static Export)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci || npm install

      - name: Build (static export)
        run: npx next build
        env:
          # NEXT_PUBLIC_* 在 build 时写入前端包，必须在 CI 注入
          NEXT_PUBLIC_LLM_API_KEY: ${{ secrets.NEXT_PUBLIC_LLM_API_KEY }}
          NEXT_PUBLIC_LLM_BASE_URL: ${{ secrets.NEXT_PUBLIC_LLM_BASE_URL }}
          NEXT_PUBLIC_LLM_MODEL: ${{ secrets.NEXT_PUBLIC_LLM_MODEL }}
          NEXT_PUBLIC_USE_MOCK: ${{ secrets.NEXT_PUBLIC_USE_MOCK }}
          NEXT_PUBLIC_AMAP_KEY: ${{ secrets.NEXT_PUBLIC_AMAP_KEY }}
          NEXT_PUBLIC_AMAP_SECURITY: ${{ secrets.NEXT_PUBLIC_AMAP_SECURITY }}

      - name: Package and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: DEPLOY_DIR
          script: |
            set -e
            DEPLOY_DIR=/usr/share/nginx/html/xuncheng
            echo "Preparing deploy directory..."
            rm -rf $DEPLOY_DIR/*
            mkdir -p $DEPLOY_DIR

      - name: Upload static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "out/*"
          target: /usr/share/nginx/html/xuncheng
          strip_components: 1
          overwrite: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            echo "Verifying deployment..."
            FILE_COUNT=$(find /usr/share/nginx/html/xuncheng -type f | wc -l)
            echo "Deployed $FILE_COUNT files"
            curl -sf http://127.0.0.1:8080/ > /dev/null && echo "✅ Site accessible" || echo "❌ Site not accessible"
            # Reload nginx to ensure fresh state
            nginx -s reload 2>/dev/null || true
