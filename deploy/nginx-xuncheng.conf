# 寻城 (journey-guide) — Nginx 反向代理配置（Node standalone + pm2）
#
# 应用由 pm2 运行在 127.0.0.1:3000（见 .github/workflows/deploy.yml）。
# nginx 作为反向代理转发到该端口，支持 API 路由 / SSR / 流式响应。
#
# 启用：
#   sudo cp deploy/nginx-xuncheng.conf /etc/nginx/conf.d/xuncheng.conf
#   sudo nginx -t && sudo systemctl reload nginx

upstream xuncheng_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen 8080;
    # listen 443 ssl http2;
    # 47.109.91.112:8080 是当前演示入口；域名接入后把域名追加到这里。
    server_name 47.109.91.112 xuncheng.example.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    client_max_body_size 2m;

    # Next 静态资源（文件名含 hash）长期缓存，直接透传给 Node
    location /_next/static/ {
        proxy_pass http://xuncheng_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # AI 流式接口：关闭缓冲，保证 SSE/流式逐块下发
    location /api/ {
        proxy_pass http://xuncheng_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # 其余全部转发到 Node（SSR / 页面 / 图片等）
    location / {
        proxy_pass http://xuncheng_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}

# =============================================================================
# 服务器一次性准备（Ubuntu/CentOS 通用思路）
# =============================================================================
# 1. 安装 Node 20 与 pm2：
#      curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -   # Debian/Ubuntu
#      sudo apt-get install -y nodejs
#      sudo npm i -g pm2
# 2. 首次让 pm2 开机自启（部署后 pm2 save 已保存进程列表）：
#      pm2 startup systemd -u root --hp /root   # 按提示执行输出的命令
# 3. 配置 nginx（见上），放行安全组 80/443
# 4. HTTPS（可选）：sudo certbot --nginx -d xuncheng.example.com
