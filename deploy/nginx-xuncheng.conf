# 寻城 (journey-guide) — Nginx 静态站点配置
#
# 构建产物由 GitHub Actions 上传到：
#   /usr/share/nginx/html/xuncheng/
#
# 重要：next.config.js 未设置 basePath，资源路径为 /_next/...
# 因此请用「方案 A」将本目录作为站点根目录（子域名或独立 server）。
# 若必须挂在 /xuncheng/ 子路径，见方案 B 并修改 next.config.js。

# =============================================================================
# 方案 A（推荐）：子域名或独立 IP，站点根目录即 xuncheng 文件夹
# 访问示例：https://xuncheng.example.com/
# =============================================================================

server {
    listen 80;
    # listen 443 ssl http2;
    server_name xuncheng.example.com;   # 改成你的域名，或用 _ 匹配默认

    root /usr/share/nginx/html/xuncheng;
    index index.html;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    # 开启 gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Next.js 静态导出（trailingSlash: true）
    # /guide/yangzhou/ → guide/yangzhou/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # 静态资源长期缓存（文件名含 hash）
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # 404 可回退到首页（可选；纯静态站一般保持 =404 更利于排查）
    # error_page 404 /index.html;
}

# =============================================================================
