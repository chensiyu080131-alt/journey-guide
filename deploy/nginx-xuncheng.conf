# =============================================================================
# 服务器上启用步骤（方案 A）
# =============================================================================
#
# 1. 复制本文件到服务器：
#    sudo cp deploy/nginx-xuncheng.conf /etc/nginx/conf.d/xuncheng.conf
#
# 2. 修改 server_name（或先用 IP 测试）
#
# 3. 检查并重载：
#    sudo nginx -t && sudo systemctl reload nginx
#
# 4. 若用域名，确保 DNS A 记录指向 ECS 公网 IP；安全组放行 80/443
#
# 5. HTTPS（可选，Certbot）：
#    sudo certbot --nginx -d xuncheng.example.com
